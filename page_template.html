  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --pink: #FF6B9D;
      --pink-light: #FF8DB5;
      --pink-dark: #E85382;
      --yellow: #FFD93D;
      --yellow-light: #FFE680;
      --blue: #6BCBFF;
      --bg: #FFF5F8;
      --bg-card: #FFFFFF;
      --text: #2D2D2D;
      --text-dim: #888888;
      --border: #FFE0EC;
      --shadow: 0 4px 24px rgba(255,107,157,0.08);
      --radius: 24px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }
    a { color: var(--pink); text-decoration: none; }
    a:hover { color: var(--pink-dark); }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--pink), var(--yellow), var(--blue));
      padding: 14px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(255,107,157,0.2);
    }
    .header-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 22px; font-weight: 800; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .logo span { color: var(--yellow); }
    nav { display: flex; gap: 6px; flex-wrap: wrap; }
    nav a { color: #fff; padding: 6px 14px; border-radius: 30px; font-size: 13px; font-weight: 600; transition: all .2s; }
    
    .music-btn {
      background: #FF6B9D; border: 2px solid #FF6B9D;
      color: #fff; font-size: 20px;
      box-shadow: 0 2px 8px rgba(255,107,157,0.3);
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .25s;
    }
    .music-btn:hover { background: #E85382; border-color: #E85382; transform: scale(1.05); }
    .music-btn.playing { 
      border-color: #FF6B9D; color: #FF6B9D;
      animation: pulseGlow 2s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 4px rgba(255,107,157,0.2); }
      50% { box-shadow: 0 0 12px rgba(255,107,157,0.4); }
    }
    nav a:hover { background: rgba(255,255,255,0.25); }

    .page-header {
      text-align: center;
      padding: 48px 24px 32px;
      background: linear-gradient(135deg, rgba(255,240,245,0.9), rgba(255,248,225,0.9));
    }
    .page-header h1 { font-size: 32px; font-weight: 800; color: var(--pink); margin-bottom: 8px; }
    .page-header p { color: var(--text-dim); max-width: 600px; margin: 0 auto; }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    section { padding: 36px 0; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .card {
      background: var(--bg-card);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      transition: all .3s cubic-bezier(.34,1.56,.64,1);
      transform: perspective(800px) rotateX(0deg);
    }
    .card:hover {
      transform: perspective(800px) rotateX(2deg) translateY(-4px);
      box-shadow: 0 12px 40px rgba(255,107,157,0.12);
    }
    .card-img {
      width: 100%; height: 160px;
      background-size: cover; background-position: center;
      border-radius: 16px; margin-bottom: 12px;
    }

    footer {
      background: linear-gradient(135deg, var(--pink), var(--blue));
      padding: 28px 24px 20px; margin-top: 24px; color: #fff;
    }
    footer .container { max-width: 1100px; margin: 0 auto; }
    .footer-links { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 16px; }
    .footer-links a { color: rgba(255,255,255,0.8); font-size: 14px; }
    .footer-links a:hover { color: #fff; }
    .footer-bottom { font-size: 13px; opacity: 0.7; }

    @media (max-width: 640px) {
      .page-header h1 { font-size: 24px; }
      .header-inner { flex-direction: column; gap: 10px; }
      nav { justify-content: center; }
    }
  </style>

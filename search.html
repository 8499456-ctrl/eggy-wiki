<script>
  const pages = [
    {title:"Home — Eggy Wiki", url:"index.html", desc:"Eggy Party wiki hub — characters, maps, outfits, codes, guides and more"},
    {title:"Characters — Eggy Wiki", url:"characters.html", desc:"Complete character guide — stats, abilities, unlock conditions, and tier ratings"},
    {title:"Classic Egg", url:"characters/classic-egg.html", desc:"Balanced starter egg with even stats. Free to play."},

    {title:"Cat Egg", url:"characters/cat-egg.html", desc:"Soft landing + 40% faster knockback recovery. Best for survival."},
    {title:"Panda Egg", url:"characters/panda-egg.html", desc:"Tanky defender. Hard to knock over. Best for team mode."},
    {title:"Penguin Egg", url:"characters/penguin-egg.html", desc:"Slides faster on ice. Unmatched on Frozen Peak."},

    {title:"Volcano Rush", url:"maps/volcano-rush.html", desc:"Lava race map with collapsing platforms and fire hazards."},

    {title:"Beginner's Guide — Eggy Wiki", url:"beginner.html", desc:"New player guide covering download, controls, characters, and first win."},

    {title:"Forum — Eggy Wiki", url:"forum.html", desc:"Community forum for strategies, tips, and discussion."},
    {title:"Bugs — Eggy Wiki", url:"bugs.html", desc:"Report bugs in Eggy Party or issues with Eggy Wiki — help improve the community."},
    {title:"Download — Eggy Wiki", url:"download.html", desc:"Download Eggy Party free on iOS, Android, and PC."},
    {title:"Free Game Accelerator — Eggy Wiki", url:"free-accelerator.html", desc:"Free game booster tools to reduce lag in Eggy Party."},
    {title:"Top 10 Race Map Shortcuts — Eggy Wiki", url:"guide-shortcuts.html", desc:"Best race map shortcuts in Eggy Party — secret paths and speed boosts for every map."},

    {title:"Privacy Policy — Eggy Wiki", url:"privacy.html", desc:"Eggy Wiki privacy policy and data handling."},
    {title:"Contact — Eggy Wiki", url:"contact.html", desc:"Contact Eggy Wiki team — feedback, suggestions, and support."},
    {title:"Search — Eggy Wiki", url:"search.html", desc:"Search across all Eggy Wiki pages."},
    {title:"Golden Egg outfit", url:"outfits/golden-egg.html", desc:"Epic Season 1 Battle Pass reward. Pure gold finish."},
    {title:"Watermelon outfit", url:"outfits/watermelon.html", desc:"Rare watermelon pattern outfit from the shop."},
    {title:"Neon Star outfit", url:"outfits/neon-star.html", desc:"Epic glow-in-the-dark star outfit from Neon Festival."},
    {title:"Ice Crown outfit", url:"outfits/ice-crown.html", desc:"Epic ice crystal crown from Season 2 Diamond ranked."},
    {title:"Dragon Scales outfit", url:"outfits/dragon-scales.html", desc:"Epic dragon scale armor from Dragon's Lair event."}
  ];

  const input = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');

  function search() {
    const q = input.value.trim().toLowerCase();
    if (!q) { results.innerHTML = '<div class="search-stats">Type something above to start searching.</div>'; return; }
    const hits = pages.filter(p => p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q));
    let html = '<div class="search-stats">Found ' + hits.length + ' result' + (hits.length !== 1 ? 's' : '') + '</div>';
    if (hits.length === 0) { html += '<div class="no-results">No results found. Try a different term.</div>'; }
    else { hits.forEach(p => { html += '<a class="result-item" href="' + p.url + '"><h3>' + hl(p.title, q) + '</h3><div class="url">' + p.url + '</div><p>' + hl(p.desc, q) + '</p></a>'; }); }
    results.innerHTML = html;
  }

  function hl(text, q) {
    if (!q) return text;
    const i = text.toLowerCase().indexOf(q);
    if (i === -1) return text;
    return text.substring(0, i) + '<em>' + text.substring(i, i + q.length) + '</em>' + text.substring(i + q.length);
  }

  input.addEventListener('input', search);
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') search(); });
</script>

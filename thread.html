<script>
const FORUM_THREADS = [
  { id: 'season4-discussion', title: 'Season 4 Discussion Thread — What do you think so far?', author: 'Wiki', date: '2026-07-09', tag: 'Discussion', tagClass: 'cat-discuss', replies: 12, views: 234,
    content: '<p>Season 4 is here and it\'s packed with new content! 🎉</p><p>The new Candy Arena changes are really interesting. The rotating platforms feel faster this season — has anyone else noticed that? The timing for some jumps seems tighter than before.</p><h3>New content I\'ve noticed so far:</h3><ul><li>Candy Arena layout changes — new rotation pattern</li><li>Dragon Egg rerun (finally!) — available in the shop</li><li>Balance changes to Fox Egg — dash cooldown slightly increased</li><li>New limited outfits in the Battle Pass</li></ul><p>Also, the Dragon Egg rerun is finally happening! I\'ve been waiting months for this. If you missed the original release, now\'s your chance to grab it.</p><p>What do you think of the new season? Any favorite changes or things you\'re disappointed about?</p>' },
  { id: 'best-character', title: 'Best starter character for ranked mode?', author: 'NoobEgg', date: '2026-07-08', tag: 'Question', tagClass: 'cat-guide', replies: 28, views: 567,
    content: '<p>Hey everyone! 👋</p><p>I just hit the required level to play ranked mode. I\'ve been using Classic Egg in casual but I feel like I need something better for ranked.</p><p>I have enough gems to unlock one character. I\'m looking at:</p><ul><li><b>🐰 Bunny Egg</b> — The high jump looks useful for vertical maps</li><li><b>🦊 Fox Egg</b> — Fast dash sounds good but I\'m not that advanced yet</li><li><b>🐱 Cat Egg</b> — Everyone says this is the best for survival, but I play mostly race</li></ul><p>Which one would you recommend for a beginner in ranked? I mainly play Race mode but occasionally try Survival.</p><p>Thanks!</p>' },
  { id: 'bulu-minty-unlock', title: 'How to unlock Bulu and Minty?', author: 'CollectorEgg', date: '2026-07-07', tag: 'Question', tagClass: 'cat-general', replies: 9, views: 312,
    content: '<p>I\'ve been playing for a couple weeks and I keep seeing Bulu and Minty in matches. They look so cool! How do I unlock them?</p><p>I checked the character shop but they\'re not listed there. Are they limited edition or do I need to do something special?</p><p>I\'m level 23 if that helps.</p>' },
  { id: 'frozen-peak-speedrun', title: 'Frozen Peak speedrun competition — submit your times!', author: 'SpeedrunComm', date: '2026-07-06', tag: 'General', tagClass: 'cat-general', replies: 43, views: 892,
    content: '<p>🏁 <b>Frozen Peak Speedrun Challenge!</b></p><p>Current record: <b>1:42.32</b> by FoxEggPro</p><p>Think you can beat it? We\'re hosting an unofficial speedrun competition for the Frozen Peak race map!</p><h3>Rules:</h3><ul><li>Must be on Frozen Peak, any character allowed</li><li>Record your run (mobile screen recording or PC capture)</li><li>Submit your time by replying to this thread with your video</li><li>Winners get bragging rights + a shoutout on the wiki!</li></ul><h3>Current Leaderboard:</h3><ol><li>🥇 FoxEggPro — 1:42.32</li><li>🥈 PenguinMaster — 1:44.18</li><li>🥉 SlideKing — 1:47.05</li></ol><p>I hope to see more submissions! The hidden ice ramp shortcut is key — check our <a href="guide-shortcuts.html">shortcuts guide</a> for tips!</p>' },
  { id: 'new-player-tips', title: 'Just started — any tips for a complete newbie?', author: 'FreshEgg', date: '2026-07-05', tag: 'Guide', tagClass: 'cat-guide', replies: 35, views: 701,
    content: '<p>Hey everyone! I just downloaded Eggy Party yesterday and I\'m having a blast but I\'m also totally lost! 😅</p><p>I\'ve played about 10 matches and I keep coming in 6th-8th place. I watched some videos but they use terms I don\'t understand.</p><p>Can anyone give me some beginner tips? Like:</p><ul><li>Which character should I start with?</li><li>What should I spend my first gems on?</li><li>Is there a way to practice without other players?</li><li>What does "dash jump" mean and how do I do it?</li></ul><p>Any help is appreciated! I really want to get better at this game.</p>' },
  { id: 'bug-candy-arena', title: '🐛 Bug: Candy Arena tile invisible on mobile', author: 'MobilePlayer', date: '2026-07-04', tag: 'Bug', tagClass: 'cat-bug', replies: 7, views: 156,
    content: '<p>Found a bug on Candy Arena! 🐛</p><p>On the rotating section, one specific tile on the outer ring (the third tile from the north entrance) is invisible on mobile devices running iOS 18+. I\'ve fallen through it 3 times now!</p><p><b>Steps to reproduce:</b></p><ol><li>Play Candy Arena on iOS 18+</li><li>Go to the outer ring, north entrance</li><li>Step on the third tile from the entrance</li><li>The tile is invisible but you fall through it</li></ol><p><b>Device:</b> iPhone 15 Pro, iOS 18.3</p><p><b>Character:</b> Cat Egg</p><p>Anyone else experiencing this?</p>' },
  { id: 'penguin-op', title: 'Is Penguin Egg OP on ice maps, or just good?', author: 'IceBreaker', date: '2026-07-03', tag: 'Discussion', tagClass: 'cat-discuss', replies: 19, views: 445,
    content: '<p>Hot take: Penguin Egg on Frozen Peak isn\'t just good — it\'s borderline overpowered. 🐧❄️</p><p>Let me break it down: Penguin Egg doesn\'t lose speed on ice surfaces. That means on Frozen Peak, other eggs slide and lose 15-20% of their speed on ice patches, while Penguin Egg maintains full traction. Over the course of a full race, that\'s a 5-8 second advantage.</p><p>In a game where races are decided by fractions of a second, Penguin Egg on Frozen Peak is essentially a guaranteed top 3 finish if the player is even halfway decent.</p><p>Should Penguin Egg get nerfed on ice maps? Or is it a legitimate character strength that makes the game more interesting?</p><p>Curious what you all think!</p>' },
  { id: 'free-gems-guide', title: '💎 Complete guide to farming free gems in 2026', author: 'Wiki', date: '2026-07-02', tag: 'Guide', tagClass: 'cat-guide', replies: 53, views: 1203,
    content: '<p>Want to save money and still get all the cool outfits? Here\'s my complete guide to farming free gems in Season 4! 💎</p><h3>Daily Gem Sources:</h3><ul><li><b>Daily missions:</b> 30 gems/day (3 missions x 10 gems each)</li><li><b>Free crate:</b> Chance of 10-50 gems per day</li><li><b>Login bonus:</b> 100 gems/week (just log in 5 days)</li></ul><h3>Weekly Gem Sources:</h3><ul><li><b>Weekly missions:</b> 150 gems total</li><li><b>Ranked rewards:</b> 50-200 gems depending on tier</li><li><b>Club contribution:</b> 30 gems if your club is active</li></ul><h3>One-Time Sources:</h3><ul><li><b>Level up rewards:</b> ~500 gems total from level 1-50</li><li><b>Achievements:</b> ~300 gems available</li><li><b>Redeem codes:</b> Check our <a href="codes.html">codes page</a> for active codes!</li></ul><p><b>Monthly total (free):</b> ~1,500-2,000 gems per month if you play daily</p><p>Save your gems for limited-time collab outfits — they\'re usually 960-1,440 gems each and may never return!</p>' },
  { id: 'team-voice-chat', title: 'Can we get voice chat in team mode?', author: 'SquadLeader', date: '2026-07-01', tag: 'Discussion', tagClass: 'cat-discuss', replies: 31, views: 678,
    content: '<p>Is it just me or does Team mode desperately need voice chat? 🔊</p><p>The quick chat system is okay for basic stuff, but when you\'re trying to coordinate a Capture the Flag run or organize a defense, typing messages or using preset phrases just doesn\'t cut it.</p><p>I play with a regular team of 4 and we have to use Discord on our phones while playing. It works, but it\'s clunky. I wish we had built-in voice chat like in PUBG Mobile or Call of Duty Mobile.</p><p>What do you think? Would voice chat improve Team mode or would it be a mess with random teammates?</p>' },
  { id: 'fanart-showcase', title: '🎨 Fan art showcase thread — share your creations!', author: 'ArtEgg', date: '2026-06-30', tag: 'Fan Art', tagClass: 'cat-fan', replies: 67, views: 1432,
    content: '<p>Hey Eggy Party artists! 🎨</p><p>I wanted to create a thread where we can all share our Eggy Party fan art! Whether it\'s a quick sketch, a digital painting, or even a cosplay — let\'s see what you\'ve created!</p><p>I\'ll start: I drew my Cat Egg character in a superhero pose. I\'m still learning digital art but I\'m pretty happy with how the shading turned out! 🐱💫</p><p>Share your art below! All skill levels welcome — this is a supportive space!</p>' },
  { id: 'codes-july', title: '🎁 July 2026 redeem codes — active and working!', author: 'Wiki', date: '2026-06-29', tag: 'Guide', tagClass: 'cat-guide', replies: 104, views: 3456,
    content: '<p>Updated for July 2026! All codes tested and working as of this week. 🎁</p><h3>Active Codes:</h3><ul><li><b>EGGY2026</b> — 100 gems (expires July 31)</li><li><b>SUMMERFUN</b> — Summer Beach Hat cosmetic (new!)</li><li><b>SEASON4BOOST</b> — 2x XP boost for 1 hour</li><li><b>WIKI50</b> — 50 free hours of game accelerator (limited)</li><li><b>BUNNYLOVE</b> — Bunny Ear accessory (expires July 15)</li></ul><h3>How to redeem:</h3><ol><li>Open Eggy Party</li><li>Go to Settings → Redeem Code</li><li>Enter the code exactly as shown</li><li>Tap confirm</li></ol><p>Codes are case-sensitive and usually have limited redemptions. Grab them fast!</p><p>🔗 Full details and more codes: <a href="codes.html">eggywikigames.com/codes</a></p>' }
];

(function() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const container = document.getElementById('threadContainer');
  const subtitle = document.getElementById('threadSubtitle');
  const titleEl = document.querySelector('title');

  if (!id) {
    container.innerHTML = '<div style="text-align:center;padding:40px;"><p style="color:var(--text-dim);">No post specified. <a href="forum.html" style="color:var(--pink);">Go to Forum</a></p></div>';
    subtitle.textContent = 'No post selected';
    return;
  }

  const thread = FORUM_THREADS.find(t => t.id === id);
  if (!thread) {
    container.innerHTML = '<div style="text-align:center;padding:40px;"><p style="color:var(--text-dim);">Post not found. <a href="forum.html" style="color:var(--pink);">Go to Forum</a></p></div>';
    subtitle.textContent = 'Post not found';
    return;
  }

  titleEl.textContent = thread.title + ' — Eggy Wiki Forum';
  subtitle.textContent = thread.title.replace(/^[^\s]+\s/, '');

  // Generate sample replies
  const replyCount = Math.min(thread.replies, 5);
  const authors = ['EggFan42', 'DashMaster', 'SurvivalPro', 'RaceKing', 'GemCollector', 'MapExplorer', 'TeamPlayer', 'CrateOpener'];
  const texts = [
    'Totally agree! Great post! 🙌',
    'Thanks for sharing this!',
    'I had the same experience. Helpful thread!',
    'Can you explain more about this?',
    'Awesome, been looking for this info!',
    'Game changer! Thanks Wiki 🥚',
    'Tried this and it works perfectly!',
    'Let me add my experience too...'
  ];
  let replies = [];
  for (let i = 0; i < replyCount; i++) {
    const d = new Date();
    d.setDate(d.getDate() - (replyCount - i));
    replies.push({
      author: authors[i % authors.length],
      time: d.toLocaleDateString('en-US', { month:'short', day:'numeric' }),
      text: texts[i % texts.length],
      isMember: i % 3 === 0
    });
  }

  let html = '';
  html += '<a href="forum.html" class="back-link">← Back to Forum</a>';

  // Post header
  html += '<div class="post-header">';
  html += '<div class="post-title">' + thread.title + '</div>';
  html += '<div class="post-meta"><span>by: <span class="pauthor">' + thread.author + '</span></span><span>📅 ' + thread.date + '</span><span>💬 ' + thread.replies + ' replies</span><span>👁️ ' + (thread.views >= 1000 ? (thread.views/1000).toFixed(1) + 'k' : thread.views) + '</span></div>';
  html += '<div class="post-tags"><span class="tag ' + thread.tagClass + '">' + thread.tag + '</span></div>';
  html += '</div>';

  // Content
  html += '<div class="post-content">' + thread.content + '</div>';

  // Replies
  html += '<div class="replies-section">';
  html += '<h3>💬 Replies (' + thread.replies + ')</h3>';
  replies.forEach(r => {
    html += '<div class="reply-item"><div class="rheader"><span class="rname">' + r.author + '</span>' + (r.isMember ? '<span class="rbadge">⚡ Member</span>' : '') + '<span class="rtime">' + r.time + '</span></div><div class="rbody">' + r.text + '</div></div>';
  });
  if (thread.replies > replyCount) {
    html += '<p style="text-align:center;padding:10px;color:var(--text-dim);font-size:13px;">… and ' + (thread.replies - replyCount) + ' more replies. <a href="forum.html" style="color:var(--pink);">Join the discussion</a></p>';
  }
  html += '<button class="reply-btn" onclick="alert(\'Reply directly in the comments below! 👇\')">💬 Reply to this post</button>';
  html += '</div>';

  // Giscus comments
  html += '<div id="thread-giscus" style="margin-top:20px;"></div>';

  container.innerHTML = html;

  // Mount Giscus for this thread
  const giscusScript = document.createElement('script');
  giscusScript.src = 'https://giscus.app/client.js';
  giscusScript.setAttribute('data-repo', '8499456-ctrl/eggy-wiki');
  giscusScript.setAttribute('data-repo-id', 'R_kgDOTQdJXg');
  giscusScript.setAttribute('data-category', 'General');
  giscusScript.setAttribute('data-category-id', 'DIC_kwDOTQdJXs4DAzRY');
  giscusScript.setAttribute('data-mapping', 'specific');
  giscusScript.setAttribute('data-term', 'thread_' + thread.id);
  giscusScript.setAttribute('data-strict', '1');
  giscusScript.setAttribute('data-reactions-enabled', '1');
  giscusScript.setAttribute('data-emit-metadata', '0');
  giscusScript.setAttribute('data-input-position', 'top');
  giscusScript.setAttribute('data-theme', 'https://giscus.app/themes/noborder_light.css');
  giscusScript.setAttribute('data-lang', 'en');
  giscusScript.setAttribute('crossorigin', 'anonymous');
  giscusScript.async = true;
  document.body.appendChild(giscusScript);
})();
</script>
